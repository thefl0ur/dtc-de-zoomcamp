id: orchestrator
namespace: zoomcamp

inputs:
  - id: taxi
    type: SELECT
    values: [yellow, green]
    defaults: yellow

  - id: year
    type: SELECT
    values: ["2019", "2020", "2021"]
    defaults: "2019"

  - id: months
    type: ARRAY
    itemType: STRING
    defaults: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"]

tasks:
  - id: debug_inputs
    type: io.kestra.plugin.core.log.Log
    message: "Available months: {{ inputs }}"

  - id: iterate_months
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ inputs.months }}"
    concurrencyLimit: 1 # not harm my machine
    tasks:
      - id: run_subflow
        type: io.kestra.plugin.core.flow.Subflow
        flowId: zoomcamp_module_2
        namespace: zoomcamp
        inputs:
          taxi: "{{ inputs.taxi }}"
          year: "{{ inputs.year }}"
          month: "{{ taskrun.value }}"
        wait: true
        transmitFailed: true